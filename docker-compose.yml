services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tarotapp-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/spreads"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: tarotapp-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    ports:
      - "5173:80"


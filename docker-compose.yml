services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tarotapp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: tarotapp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"


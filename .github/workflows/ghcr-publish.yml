name: Publish Containers

on:
  workflow_run:
    workflows:
      - Version Bump
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: vars
        run: |
          VERSION=$(python3 -c "import json; v=json.load(open('version.json', encoding='utf-8')); print(f\"{v['major']}.{v['minor']}.{v['patch']}\")")
          MAJOR_MINOR=$(python3 -c "import json; v=json.load(open('version.json', encoding='utf-8')); print(f\"{v['major']}.{v['minor']}\")")
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${MAJOR_MINOR}" >> "${GITHUB_OUTPUT}"
          echo "owner=${OWNER}" >> "${GITHUB_OUTPUT}"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-backend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-backend:${{ steps.vars.outputs.major_minor }}
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-frontend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-frontend:${{ steps.vars.outputs.major_minor }}
            ghcr.io/${{ steps.vars.outputs.owner }}/tarotapp-frontend:latest


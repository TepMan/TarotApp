# Server-Konfiguration
server.port=8080

# Statische Ressourcen: Spring sucht auch im externen /static Ordner (relativ zum Arbeitsverzeichnis)
# Entspricht dem "wwwroot" in ASP.NET Core
spring.web.resources.static-locations=classpath:/static/,file:../static/

# Logging-Level (DEBUG für Entwicklung, INFO für Produktion)
logging.level.com.tarotapp=DEBUG
logging.level.org.springframework.web=INFO

# Anwendungsname
spring.application.name=TarotApp

# === Swagger / OpenAPI Konfiguration ===
# Swagger UI erreichbar unter: http://localhost:8080/swagger-ui.html
# OpenAPI JSON-Spec unter:     http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Klappt alle Endpoint-Gruppen standardmäßig auf
springdoc.swagger-ui.operations-sorter=alpha

